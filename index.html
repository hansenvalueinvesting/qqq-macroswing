<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QQQ Swing Model</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #111111;
    --border: #1f1f1f;
    --text: #e8e6e1;
    --muted: #6b6862;
    --dim: #3a3835;
    --green: #5fb878;
    --red: #d65a5a;
    --gray: #8a8680;
    --accent: #d4a04a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  body {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }
  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-left .sub {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .price-block { text-align: right; }
  .price-block .price {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 500;
  }
  .price-block .change { font-size: 12px; }
  .change.up { color: var(--green); }
  .change.down { color: var(--red); }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .timestamp { font-size: 10px; color: var(--muted); }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 20px;
  }
  .panel-title {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 10px;
  }

  /* Signal Panel */
  .signal-state {
    font-family: 'Fraunces', serif;
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    margin: 8px 0 12px;
  }
  .signal-state.long { color: var(--green); }
  .signal-state.chop { color: var(--gray); }
  .signal-state.short { color: var(--red); }
  .signal-reason {
    font-size: 12px;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .signal-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .signal-meta .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .signal-meta .value {
    font-size: 16px;
    color: var(--text);
    margin-top: 4px;
    font-family: 'Fraunces', serif;
    font-weight: 500;
  }

  /* Metrics Table */
  .metrics-row {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr auto;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    font-size: 12px;
  }
  .metrics-row:last-child { border-bottom: none; }
  .metrics-row .label { color: var(--muted); }
  .metrics-row .val { font-weight: 500; }
  .metrics-row .delta { color: var(--muted); font-size: 11px; }
  .check {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .check.yes { color: var(--green); }
  .check.no { color: var(--red); }

  /* Chart Panel */
  .chart-panel {
    grid-column: 1 / -1;
    padding: 20px;
  }
  .chart-wrap {
    position: relative;
    height: 380px;
  }

  /* Signal Log */
  .log-panel { grid-column: 1 / -1; }
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .log-table th, .log-table td {
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .log-table th {
    color: var(--muted);
    font-weight: 400;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .log-table .pill {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .pill.long { color: var(--green); border: 1px solid var(--green); }
  .pill.chop { color: var(--gray); border: 1px solid var(--gray); }
  .pill.short { color: var(--red); border: 1px solid var(--red); }

  /* Inline metric calculation expandables */
  .metric { border-bottom: 1px solid var(--border); }
  .metric:last-child { border-bottom: none; }
  .metric > summary {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr auto 14px;
    gap: 12px;
    padding: 10px 0;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
    list-style: none;
  }
  .metric > summary::-webkit-details-marker { display: none; }
  .metric > summary::marker { content: ''; }
  .metric > summary .label { color: var(--muted); }
  .metric > summary .val { font-weight: 500; }
  .metric > summary .delta { color: var(--muted); font-size: 11px; }
  .metric > summary .chev {
    color: var(--muted);
    font-size: 10px;
    transition: transform 0.15s;
    user-select: none;
  }
  .metric[open] > summary .chev { transform: rotate(90deg); }
  .metric > summary:hover .chev { color: var(--accent); }
  .metric-calc {
    background: #0d0d0d;
    border: 1px solid var(--border);
    padding: 10px 12px 12px;
    font-size: 11px;
    color: var(--text);
    line-height: 1.7;
    white-space: pre-wrap;
    margin: 0 0 12px;
  }
  .metric-calc .c { color: var(--muted); }
  .metric-calc .h {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    display: block;
    margin-bottom: 6px;
  }

  /* Signal rule expandable */
  .signal-rules { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .signal-rules > summary {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .signal-rules > summary::-webkit-details-marker { display: none; }
  .signal-rules > summary:hover { color: var(--accent); }
  .signal-rules > summary .chev { transition: transform 0.15s; }
  .signal-rules[open] > summary .chev { transform: rotate(90deg); }
  .signal-rules .rules-body { margin-top: 10px; }
  .rule-row {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
  }
  .rule-row:last-child { border-bottom: none; }
  .rule-row .name {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }
  .rule-row .name .state { font-weight: 700; letter-spacing: 0.1em; font-size: 12px; }
  .rule-row .name .state.long { color: var(--green); }
  .rule-row .name .state.short { color: var(--red); }
  .rule-row .name .state.chop { color: var(--gray); }
  .rule-row .name .badge {
    font-size: 9px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .rule-row .name .badge.pass { color: var(--green); border-color: var(--green); }
  .rule-row .name .badge.fail { color: var(--muted); }
  .rule-row .name .badge.active { color: var(--accent); border-color: var(--accent); }
  .rule-row .conds { color: var(--muted); line-height: 1.7; }
  .rule-row .conds .ok { color: var(--green); }
  .rule-row .conds .bad { color: var(--red); }

  /* HMM probability bars */
  .hmm-probs {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .prob-row {
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    gap: 10px;
    align-items: center;
    padding: 4px 0;
    font-size: 11px;
  }
  .prob-label {
    font-weight: 700;
    letter-spacing: 0.1em;
    font-size: 10px;
  }
  .prob-label.long { color: var(--green); }
  .prob-label.chop { color: var(--gray); }
  .prob-label.short { color: var(--red); }
  .prob-bar {
    position: relative;
    height: 8px;
    background: var(--border);
    overflow: hidden;
  }
  .prob-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
  }
  .prob-fill.long { background: var(--green); }
  .prob-fill.chop { background: var(--gray); }
  .prob-fill.short { background: var(--red); }
  .prob-val {
    text-align: right;
    color: var(--text);
    font-weight: 500;
  }

  /* HMM transition matrix */
  table.hmm-matrix {
    width: 100%;
    border-collapse: collapse;
    margin: 6px 0;
    font-size: 11px;
  }
  table.hmm-matrix th, table.hmm-matrix td {
    padding: 6px 8px;
    border: 1px solid var(--border);
    text-align: center;
  }
  table.hmm-matrix thead th { color: var(--muted); font-weight: 400; text-transform: uppercase; letter-spacing: 0.1em; font-size: 9px; }
  table.hmm-matrix tbody th { color: var(--muted); font-weight: 400; text-align: right; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  table.hmm-matrix td.diag { color: var(--accent); font-weight: 700; }

  .loading, .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .error { color: var(--red); }
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>

<body>

<div class="header">
  <div class="header-left">
    <h1>QQQ Swing Model</h1>
    <div class="sub">Regime-gated leveraged ETF strategy</div>
  </div>
  <div class="header-right">
    <div class="price-block">
      <div class="price" id="qqq-price">—</div>
      <div class="change" id="qqq-change">—</div>
    </div>
    <button class="refresh-btn" onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="timestamp" style="margin-bottom: 16px;"><span id="timestamp">—</span></div>

<div id="content">
  <div class="loading"><span class="spinner"></span>Loading QQQ data…</div>
</div>

<script>
const CACHE_KEY = 'qqq-trend-signal-cache';
const CACHE_TTL = 4 * 60 * 60 * 1000; // 4 hours

// HMM regime model
const HMM_CACHE_KEY = 'qqq-hmm-params-v1';
const HMM_N_STATES = 3;
const HMM_N_RESTARTS = 6;
const HMM_MAX_ITER = 100;
const HMM_TOL = 1e-5;
const HMM_DIAG_PRIOR = 0.95; // initial self-transition probability bias

// ---------- HMM core ----------
function gaussLogPdf(x, mu, sigma) {
  const z = (x - mu) / sigma;
  return -0.5 * z * z - Math.log(sigma) - 0.5 * Math.log(2 * Math.PI);
}

function logSumExp(arr) {
  let m = -Infinity;
  for (const v of arr) if (v > m) m = v;
  if (!isFinite(m)) return m;
  let s = 0;
  for (const v of arr) s += Math.exp(v - m);
  return m + Math.log(s);
}

function emitMatrix(obs, means, stds) {
  const T = obs.length, K = means.length;
  const E = Array.from({length: T}, () => new Array(K));
  for (let t = 0; t < T; t++) {
    for (let k = 0; k < K; k++) {
      E[t][k] = gaussLogPdf(obs[t], means[k], stds[k]);
    }
  }
  return E;
}

function forwardLog(E, logPi, logA) {
  const T = E.length, K = logPi.length;
  const a = Array.from({length: T}, () => new Array(K));
  for (let k = 0; k < K; k++) a[0][k] = logPi[k] + E[0][k];
  const tmp = new Array(K);
  for (let t = 1; t < T; t++) {
    for (let k = 0; k < K; k++) {
      for (let j = 0; j < K; j++) tmp[j] = a[t-1][j] + logA[j][k];
      a[t][k] = logSumExp(tmp) + E[t][k];
    }
  }
  return a;
}

function backwardLog(E, logA) {
  const T = E.length, K = logA.length;
  const b = Array.from({length: T}, () => new Array(K).fill(0));
  const tmp = new Array(K);
  for (let t = T - 2; t >= 0; t--) {
    for (let k = 0; k < K; k++) {
      for (let j = 0; j < K; j++) tmp[j] = logA[k][j] + E[t+1][j] + b[t+1][j];
      b[t][k] = logSumExp(tmp);
    }
  }
  return b;
}

function viterbiLog(E, logPi, logA) {
  const T = E.length, K = logPi.length;
  const dp = Array.from({length: T}, () => new Array(K));
  const bk = Array.from({length: T}, () => new Array(K).fill(0));
  for (let k = 0; k < K; k++) dp[0][k] = logPi[k] + E[0][k];
  for (let t = 1; t < T; t++) {
    for (let k = 0; k < K; k++) {
      let bestJ = 0, bestV = -Infinity;
      for (let j = 0; j < K; j++) {
        const v = dp[t-1][j] + logA[j][k];
        if (v > bestV) { bestV = v; bestJ = j; }
      }
      dp[t][k] = bestV + E[t][k];
      bk[t][k] = bestJ;
    }
  }
  let end = 0;
  for (let k = 1; k < K; k++) if (dp[T-1][k] > dp[T-1][end]) end = k;
  const path = new Array(T);
  path[T-1] = end;
  for (let t = T - 2; t >= 0; t--) path[t] = bk[t+1][path[t+1]];
  return path;
}

function initParams(obs, K, perturb = 0.2) {
  const T = obs.length;
  const sorted = [...obs].sort((a, b) => a - b);
  const means = new Array(K), stds = new Array(K);
  for (let k = 0; k < K; k++) {
    const lo = Math.floor(T * k / K), hi = Math.floor(T * (k + 1) / K);
    const slice = sorted.slice(lo, hi);
    const mu = slice.reduce((s, x) => s + x, 0) / slice.length;
    const v = slice.reduce((s, x) => s + (x - mu) ** 2, 0) / slice.length;
    means[k] = mu + (Math.random() - 0.5) * Math.sqrt(v) * perturb;
    stds[k] = Math.sqrt(Math.max(v, 1e-10)) * (1 + (Math.random() - 0.5) * perturb);
  }
  const logPi = new Array(K).fill(Math.log(1 / K));
  const logA = Array.from({length: K}, (_, i) =>
    Array.from({length: K}, (_, j) =>
      Math.log(i === j ? HMM_DIAG_PRIOR : (1 - HMM_DIAG_PRIOR) / (K - 1))
    )
  );
  return { logPi, logA, means, stds };
}

function baumWelch(obs, K, maxIter, tol) {
  const T = obs.length;
  let { logPi, logA, means, stds } = initParams(obs, K);
  let prevLL = -Infinity;
  let finalLL = -Infinity;

  for (let iter = 0; iter < maxIter; iter++) {
    const E = emitMatrix(obs, means, stds);
    const a = forwardLog(E, logPi, logA);
    const b = backwardLog(E, logA);
    const ll = logSumExp(a[T-1]);
    finalLL = ll;

    // gamma[t][k] = log P(s_t=k | obs)
    const gamma = Array.from({length: T}, () => new Array(K));
    for (let t = 0; t < T; t++) {
      const tmp = new Array(K);
      for (let k = 0; k < K; k++) tmp[k] = a[t][k] + b[t][k];
      const denom = logSumExp(tmp);
      for (let k = 0; k < K; k++) gamma[t][k] = tmp[k] - denom;
    }

    // M-step: pi
    for (let k = 0; k < K; k++) logPi[k] = gamma[0][k];

    // M-step: A using xi
    const xiNumer = Array.from({length: K}, () => new Array(K).fill(-Infinity));
    for (let i = 0; i < K; i++) {
      for (let j = 0; j < K; j++) {
        const terms = new Array(T - 1);
        for (let t = 0; t < T - 1; t++) {
          terms[t] = a[t][i] + logA[i][j] + E[t+1][j] + b[t+1][j] - ll;
        }
        xiNumer[i][j] = logSumExp(terms);
      }
    }
    for (let i = 0; i < K; i++) {
      const rowDenom = logSumExp(xiNumer[i]);
      for (let j = 0; j < K; j++) logA[i][j] = xiNumer[i][j] - rowDenom;
    }

    // M-step: means & stds
    for (let k = 0; k < K; k++) {
      let wSum = 0, wxSum = 0;
      for (let t = 0; t < T; t++) {
        const w = Math.exp(gamma[t][k]);
        wSum += w; wxSum += w * obs[t];
      }
      const mu = wxSum / wSum;
      let wvSum = 0;
      for (let t = 0; t < T; t++) {
        const w = Math.exp(gamma[t][k]);
        wvSum += w * (obs[t] - mu) ** 2;
      }
      means[k] = mu;
      stds[k] = Math.sqrt(Math.max(wvSum / wSum, 1e-10));
    }

    if (Math.abs(ll - prevLL) < tol) break;
    prevLL = ll;
  }
  return { logPi, logA, means, stds, logLikelihood: finalLL };
}

function fitHMM(obs, K = HMM_N_STATES, nRestarts = HMM_N_RESTARTS, maxIter = HMM_MAX_ITER, tol = HMM_TOL) {
  let best = null;
  for (let r = 0; r < nRestarts; r++) {
    try {
      const result = baumWelch(obs, K, maxIter, tol);
      if (!isFinite(result.logLikelihood)) continue;
      if (!best || result.logLikelihood > best.logLikelihood) best = result;
    } catch (e) { /* skip degenerate restart */ }
  }
  // Sort states by mean ascending → SHORT, CHOP, LONG
  const order = best.means.map((_, i) => i).sort((a, b) => best.means[a] - best.means[b]);
  const stateNames = ['SHORT', 'CHOP', 'LONG'];
  const labelOf = {};
  order.forEach((origIdx, sortedPos) => { labelOf[origIdx] = stateNames[sortedPos]; });
  return { ...best, labelOf, order, stateNames };
}

function hmmPosterior(E, logPi, logA) {
  const T = E.length, K = logPi.length;
  const a = forwardLog(E, logPi, logA);
  const b = backwardLog(E, logA);
  const post = Array.from({length: T}, () => new Array(K));
  for (let t = 0; t < T; t++) {
    const tmp = new Array(K);
    for (let k = 0; k < K; k++) tmp[k] = a[t][k] + b[t][k];
    const denom = logSumExp(tmp);
    for (let k = 0; k < K; k++) post[t][k] = Math.exp(tmp[k] - denom);
  }
  return post;
}
// ---------- end HMM core ----------

// State colors for chart shading
const STATE_COLORS = {
  LONG: 'rgba(95, 184, 120, 0.08)',
  CHOP: 'rgba(138, 134, 128, 0.06)',
  SHORT: 'rgba(214, 90, 90, 0.08)'
};

async function fetchQQQ(force = false) {
  if (!force) {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const parsed = JSON.parse(cached);
      if (Date.now() - parsed.ts < CACHE_TTL) {
        return parsed.data.map(d => ({ date: new Date(d.date), close: d.close }));
      }
    }
  }
  const yahooUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/QQQ?range=2y&interval=1d';
  // Our own Cloudflare Worker, allowlisted to Yahoo Finance only.
  const proxied = 'https://qqq-macroswing.gulagmonke.workers.dev/?url=' + encodeURIComponent(yahooUrl);
  const res = await fetch(proxied);
  if (!res.ok) throw new Error('Proxy fetch failed: ' + res.status);
  const json = await res.json();
  const result = json.chart.result[0];
  const timestamps = result.timestamp;
  const closes = result.indicators.quote[0].close;
  const data = timestamps.map((t, i) => ({
    date: new Date(t * 1000),
    close: closes[i]
  })).filter(d => d.close != null);
  localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: data.map(d => ({ date: d.date.toISOString(), close: d.close })) }));
  return data.map(d => ({ date: typeof d.date === 'string' ? new Date(d.date) : d.date, close: d.close }));
}

function sma(arr, period, idx) {
  if (idx < period - 1) return null;
  let s = 0;
  for (let i = idx - period + 1; i <= idx; i++) s += arr[i];
  return s / period;
}

function trainOrLoadHMM(returns, lastBarDate) {
  // Try cache: keyed by last-bar date so we don't retrain on every page load.
  try {
    const raw = localStorage.getItem(HMM_CACHE_KEY);
    if (raw) {
      const cached = JSON.parse(raw);
      if (cached.lastBarDate === lastBarDate && cached.nReturns === returns.length) {
        return { model: cached.model, fromCache: true, trainMs: 0 };
      }
    }
  } catch (e) { /* ignore */ }

  const t0 = performance.now();
  const model = fitHMM(returns);
  const trainMs = performance.now() - t0;
  try {
    localStorage.setItem(HMM_CACHE_KEY, JSON.stringify({
      lastBarDate, nReturns: returns.length, model
    }));
  } catch (e) { /* ignore quota errors */ }
  return { model, fromCache: false, trainMs };
}

function buildStateSeries(data) {
  const closes = data.map(d => d.close);
  const sma200Arr = closes.map((_, i) => sma(closes, 200, i));
  const sma50Arr = closes.map((_, i) => sma(closes, 50, i));

  // Daily log returns drive the HMM. First bar has no return → null state.
  const returns = [];
  for (let i = 1; i < closes.length; i++) {
    returns.push(Math.log(closes[i] / closes[i - 1]));
  }
  const lastBarDate = data[data.length - 1].date.toISOString().slice(0, 10);
  const { model, fromCache, trainMs } = trainOrLoadHMM(returns, lastBarDate);

  const E = emitMatrix(returns, model.means, model.stds);
  const path = viterbiLog(E, model.logPi, model.logA);
  const posterior = hmmPosterior(E, model.logPi, model.logA);

  // Map returns-indexed arrays back to closes-indexed (offset by 1)
  const states = new Array(closes.length).fill(null);
  const stateProbs = new Array(closes.length).fill(null);
  const stateProbsByLabel = new Array(closes.length).fill(null);
  for (let i = 0; i < returns.length; i++) {
    const stateIdx = path[i];
    states[i + 1] = model.labelOf[stateIdx];
    stateProbs[i + 1] = posterior[i];
    // Reorder posterior into {LONG, CHOP, SHORT} by sorted mean
    const byLabel = { LONG: 0, CHOP: 0, SHORT: 0 };
    for (let k = 0; k < model.means.length; k++) {
      byLabel[model.labelOf[k]] = posterior[i][k];
    }
    stateProbsByLabel[i + 1] = byLabel;
  }

  return {
    sma200Arr, sma50Arr, states,
    hmm: model, stateProbs, stateProbsByLabel, returns,
    hmmFromCache: fromCache, hmmTrainMs: trainMs
  };
}

function findTransitions(data, states) {
  const transitions = [];
  let lastState = null;
  let lastIdx = null;
  for (let i = 0; i < states.length; i++) {
    if (states[i] == null) continue;
    if (states[i] !== lastState) {
      if (lastState != null) {
        transitions.push({
          fromIdx: lastIdx,
          toIdx: i,
          from: lastState,
          to: states[i],
          date: data[i].date,
          price: data[i].close,
          durationDays: i - lastIdx
        });
      }
      lastState = states[i];
      lastIdx = i;
    }
  }
  // Current state info
  const currentStart = lastIdx;
  return { transitions, currentStart };
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}
function fmtNum(n, dp = 2) {
  if (n == null || isNaN(n)) return '—';
  return n.toFixed(dp);
}
function fmtPct(n, dp = 2) {
  if (n == null || isNaN(n)) return '—';
  const sign = n >= 0 ? '+' : '';
  return sign + (n * 100).toFixed(dp) + '%';
}

let chartInstance = null;

function render(data) {
  const closes = data.map(d => d.close);
  const last = data.length - 1;
  const series = buildStateSeries(data);
  const { sma200Arr, sma50Arr, states, hmm, stateProbsByLabel, returns,
          hmmFromCache, hmmTrainMs } = series;
  const { transitions, currentStart } = findTransitions(data, states);

  const price = closes[last];
  const prevPrice = closes[last - 1];
  const dayChange = (price / prevPrice - 1);
  const todayLogReturn = Math.log(price / prevPrice);
  const sma200 = sma200Arr[last];
  const sma50 = sma50Arr[last];

  const currentState = states[last] || 'CHOP';
  const probs = stateProbsByLabel[last] || { LONG: 0, CHOP: 0, SHORT: 0 };
  const sig = {
    state: currentState,
    reason: `HMM posterior: LONG ${(probs.LONG*100).toFixed(0)}% · CHOP ${(probs.CHOP*100).toFixed(0)}% · SHORT ${(probs.SHORT*100).toFixed(0)}%. Most-likely path (Viterbi) is ${currentState}.`
  };

  // Header price
  document.getElementById('qqq-price').textContent = '$' + fmtNum(price, 2);
  const chEl = document.getElementById('qqq-change');
  chEl.textContent = fmtPct(dayChange);
  chEl.className = 'change ' + (dayChange >= 0 ? 'up' : 'down');

  // Current state metadata
  const daysInState = last - currentStart;
  const lastFlip = transitions.length > 0 ? transitions[transitions.length - 1] : null;

  // HMM display helpers: per-state mean/std (annualized) keyed by label.
  const annualizedByLabel = { LONG: {mu:0, sigma:0}, CHOP: {mu:0, sigma:0}, SHORT: {mu:0, sigma:0} };
  for (let k = 0; k < hmm.means.length; k++) {
    const lbl = hmm.labelOf[k];
    annualizedByLabel[lbl] = {
      mu: hmm.means[k] * 252,
      sigma: hmm.stds[k] * Math.sqrt(252),
      muDaily: hmm.means[k],
      sigmaDaily: hmm.stds[k]
    };
  }
  // Probability of staying in current state (diag of A keyed by current state's original idx)
  const curIdx = hmm.order[ ['SHORT','CHOP','LONG'].indexOf(currentState) ];
  const stayProb = Math.exp(hmm.logA[curIdx][curIdx]);

  const probBar = (p, cls) => `<span class="prob-bar"><span class="prob-fill ${cls}" style="width:${(p*100).toFixed(1)}%"></span></span>`;
  const transitionTable = () => {
    const order = ['LONG','CHOP','SHORT'];
    const idxOf = lbl => hmm.order[ ['SHORT','CHOP','LONG'].indexOf(lbl) ];
    let html = '<table class="hmm-matrix"><thead><tr><th></th>';
    for (const c of order) html += `<th>${c}</th>`;
    html += '</tr></thead><tbody>';
    for (const r of order) {
      html += `<tr><th>${r}</th>`;
      for (const c of order) {
        const p = Math.exp(hmm.logA[idxOf(r)][idxOf(c)]);
        const diag = r === c;
        html += `<td class="${diag ? 'diag' : ''}">${(p*100).toFixed(1)}%</td>`;
      }
      html += '</tr>';
    }
    return html + '</tbody></table>';
  };

  const content = `
    <div class="grid">
      <div class="panel">
        <div class="panel-title">Current Signal</div>
        <div class="signal-state ${sig.state.toLowerCase()}">${sig.state}</div>
        <div class="signal-reason">${sig.reason}</div>
        <div class="signal-meta">
          <div>
            <div class="label">Days in state</div>
            <div class="value">${daysInState}</div>
          </div>
          <div>
            <div class="label">Last flip</div>
            <div class="value">${lastFlip ? fmtDate(lastFlip.date) : '—'}</div>
          </div>
          <div>
            <div class="label">Flip price</div>
            <div class="value">${lastFlip ? '$' + fmtNum(lastFlip.price) : '—'}</div>
          </div>
          <div>
            <div class="label">Prior state</div>
            <div class="value">${lastFlip ? lastFlip.from : '—'}</div>
          </div>
        </div>

        <div class="hmm-probs">
          <div class="prob-row"><span class="prob-label long">LONG</span>${probBar(probs.LONG, 'long')}<span class="prob-val">${(probs.LONG*100).toFixed(1)}%</span></div>
          <div class="prob-row"><span class="prob-label chop">CHOP</span>${probBar(probs.CHOP, 'chop')}<span class="prob-val">${(probs.CHOP*100).toFixed(1)}%</span></div>
          <div class="prob-row"><span class="prob-label short">SHORT</span>${probBar(probs.SHORT, 'short')}<span class="prob-val">${(probs.SHORT*100).toFixed(1)}%</span></div>
        </div>

        <details class="signal-rules">
          <summary><span class="chev">▸</span><span>How this state was determined</span></summary>
          <div class="rules-body">
            <div class="metric-calc"><span class="h">Model</span>3-state Hidden Markov Model fit to daily log returns of QQQ over the last ${returns.length} bars.
Each state has a Gaussian emission distribution N(μ, σ²); states are ordered SHORT &lt; CHOP &lt; LONG by mean return.

<span class="h">Today's log return</span><span class="c">r_t = log(close[t] / close[t−1])</span>
= log(${fmtNum(price)} / ${fmtNum(prevPrice)})
= ${todayLogReturn.toFixed(5)}

<span class="h">Per-state emission likelihood</span><span class="c">P(r_t | state) = N(r_t; μ_state, σ_state)</span>
LONG :  μ = ${(annualizedByLabel.LONG.muDaily*100).toFixed(3)}%/day, σ = ${(annualizedByLabel.LONG.sigmaDaily*100).toFixed(3)}%/day
CHOP :  μ = ${(annualizedByLabel.CHOP.muDaily*100).toFixed(3)}%/day, σ = ${(annualizedByLabel.CHOP.sigmaDaily*100).toFixed(3)}%/day
SHORT:  μ = ${(annualizedByLabel.SHORT.muDaily*100).toFixed(3)}%/day, σ = ${(annualizedByLabel.SHORT.sigmaDaily*100).toFixed(3)}%/day

<span class="h">Posterior (forward–backward)</span>P(state_t | r_1…r_T) combines the prior, the transition matrix A, and every observation through today.
LONG  ${(probs.LONG*100).toFixed(1)}%  ·  CHOP  ${(probs.CHOP*100).toFixed(1)}%  ·  SHORT  ${(probs.SHORT*100).toFixed(1)}%

<span class="h">Most-likely state (Viterbi)</span>${currentState}
The argmax of the posterior and the Viterbi path can differ briefly near regime boundaries; this dashboard uses Viterbi for the displayed state and for chart shading.

<span class="h">Persistence</span>P(state stays the same tomorrow | currently ${currentState}) = ${(stayProb*100).toFixed(1)}%</div>
          </div>
        </details>
      </div>

      <div class="panel">
        <div class="panel-title">Metrics</div>

        <details class="metric">
          <summary>
            <span class="label">QQQ Close</span>
            <span class="val">$${fmtNum(price)}</span>
            <span class="delta">${fmtPct(dayChange)} today</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">Day change</span><span class="c">(close[t] / close[t−1]) − 1</span>
= ${fmtNum(price)} / ${fmtNum(closes[last-1])} − 1
= ${fmtPct(dayChange)}

<span class="h">Source</span>Yahoo Finance · daily close · QQQ</div>
        </details>

        <details class="metric">
          <summary>
            <span class="label">200-day SMA</span>
            <span class="val">$${fmtNum(sma200)}</span>
            <span class="delta">${fmtPct(price/sma200 - 1)}</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">Definition</span><span class="c">SMA200[t] = mean(close[t−199 … t])</span>
= sum of last 200 daily closes / 200
= $${fmtNum(sma200)}

<span class="h">Price vs SMA200</span><span class="c">price / SMA200 − 1</span>
= ${fmtNum(price)} / ${fmtNum(sma200)} − 1
= ${fmtPct(price/sma200 - 1)}

<span class="h">Note</span>Displayed for context only. The HMM does not use SMAs as features — it classifies regimes from raw daily log returns.</div>
        </details>

        <details class="metric">
          <summary>
            <span class="label">50-day SMA</span>
            <span class="val">$${fmtNum(sma50)}</span>
            <span class="delta">${fmtPct(price/sma50 - 1)}</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">Definition</span><span class="c">SMA50[t] = mean(close[t−49 … t])</span>
= sum of last 50 daily closes / 50
= $${fmtNum(sma50)}

<span class="h">Price vs SMA50</span><span class="c">price / SMA50 − 1</span>
= ${fmtNum(price)} / ${fmtNum(sma50)} − 1
= ${fmtPct(price/sma50 - 1)}

<span class="h">Note</span>Informational only. State classification is done by the HMM.</div>
        </details>

        <details class="metric">
          <summary>
            <span class="label">HMM training</span>
            <span class="val">${returns.length} bars</span>
            <span class="delta">${hmmFromCache ? 'cached' : `trained in ${hmmTrainMs.toFixed(0)}ms`}</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">Training data</span>${returns.length} daily log returns derived from the last ${closes.length} closes.
<span class="c">r_t = log(close[t] / close[t−1])</span>

<span class="h">Algorithm</span>Baum-Welch (EM) with ${HMM_N_RESTARTS} random restarts, up to ${HMM_MAX_ITER} iterations, log-likelihood convergence tol ${HMM_TOL}. The best restart by log-likelihood is kept. Initialization uses quantile-based means with random perturbation and a diagonal-biased transition prior (self-transition = ${HMM_DIAG_PRIOR}).

<span class="h">Final log-likelihood</span>${hmm.logLikelihood.toFixed(2)}

<span class="h">Caching</span>Trained parameters are saved to localStorage keyed by the last bar's date. The HMM only retrains when a new daily bar arrives, so day-to-day historical state assignments stay stable.

<span class="h">State labeling</span>After fitting, the 3 latent states are sorted by mean return and labeled SHORT (lowest), CHOP (middle), LONG (highest).</div>
        </details>

        <details class="metric">
          <summary>
            <span class="label">State means (annualized)</span>
            <span class="val">L ${fmtPct(annualizedByLabel.LONG.mu)}</span>
            <span class="delta">S ${fmtPct(annualizedByLabel.SHORT.mu)}</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">Per-state emission Gaussian</span>Each HMM state emits daily log returns from N(μ, σ²). Values shown annualized (× 252 for μ, × √252 for σ).

           STATE      μ (ann.)        σ (ann.)
           LONG     ${fmtPct(annualizedByLabel.LONG.mu).padStart(8)}      ${fmtPct(annualizedByLabel.LONG.sigma).padStart(8)}
           CHOP     ${fmtPct(annualizedByLabel.CHOP.mu).padStart(8)}      ${fmtPct(annualizedByLabel.CHOP.sigma).padStart(8)}
           SHORT    ${fmtPct(annualizedByLabel.SHORT.mu).padStart(8)}      ${fmtPct(annualizedByLabel.SHORT.sigma).padStart(8)}

<span class="h">Daily figures</span>LONG  μ=${(annualizedByLabel.LONG.muDaily*100).toFixed(3)}%, σ=${(annualizedByLabel.LONG.sigmaDaily*100).toFixed(3)}%
CHOP  μ=${(annualizedByLabel.CHOP.muDaily*100).toFixed(3)}%, σ=${(annualizedByLabel.CHOP.sigmaDaily*100).toFixed(3)}%
SHORT μ=${(annualizedByLabel.SHORT.muDaily*100).toFixed(3)}%, σ=${(annualizedByLabel.SHORT.sigmaDaily*100).toFixed(3)}%</div>
        </details>

        <details class="metric">
          <summary>
            <span class="label">Transition matrix A</span>
            <span class="val">stay ${(stayProb*100).toFixed(0)}%</span>
            <span class="delta">in ${currentState}</span>
            <span></span>
            <span class="chev">▸</span>
          </summary>
          <div class="metric-calc"><span class="h">A[i][j] = P(state_{t+1} = j | state_t = i)</span>
Rows sum to 100%. Diagonal entries (highlighted) measure regime persistence.

${transitionTable()}

<span class="h">Interpretation</span>High diagonal values mean regimes are persistent — once the model labels today LONG, tomorrow is also likely LONG. Off-diagonals measure regime switching rates. P(stay in current state | currently ${currentState}) = ${(stayProb*100).toFixed(1)}%.</div>
        </details>
      </div>
    </div>

    <div class="panel chart-panel">
      <div class="panel-title">QQQ · 2-year price + SMAs (shaded by historical signal state)</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="panel log-panel">
      <div class="panel-title">Signal flip history</div>
      <table class="log-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>From</th>
            <th>→</th>
            <th>To</th>
            <th>QQQ Price</th>
            <th>Prior state duration</th>
          </tr>
        </thead>
        <tbody>
          ${transitions.slice().reverse().map(t => `
            <tr>
              <td>${fmtDate(t.date)}</td>
              <td><span class="pill ${t.from.toLowerCase()}">${t.from}</span></td>
              <td style="color: var(--muted)">→</td>

        </tbody>

    </div>
  `;
  document.getElementById('content').innerHTML = content;

  // Update timestamp
  document.getElementById('timestamp').textContent = 'Last updated ' + new Date().toLocaleString();

  // Build chart
  drawChart(data, sma200Arr, sma50Arr, states, transitions);
}

function drawChart(data, sma200Arr, sma50Arr, states, transitions) {
  const ctx = document.getElementById('chart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  const labels = data.map(d => d.date);
  const closes = data.map(d => d.close);

  // Build shading segments: { fromIdx, toIdx, state }
  const segments = [];
  let segStart = null, segState = null;
  for (let i = 0; i < states.length; i++) {
    if (states[i] == null) continue;
    if (states[i] !== segState) {
      if (segState != null) segments.push({ from: segStart, to: i - 1, state: segState });
      segState = states[i];
      segStart = i;
    }
  }
  if (segState != null) segments.push({ from: segStart, to: states.length - 1, state: segState });

  // Background shading plugin
  const shadingPlugin = {
    id: 'shading',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea, scales } = chart;
      if (!chartArea) return;
      segments.forEach(seg => {
        const xStart = scales.x.getPixelForValue(labels[seg.from]);
        const xEnd = scales.x.getPixelForValue(labels[seg.to]);
        ctx.save();
        ctx.fillStyle = STATE_COLORS[seg.state];
        ctx.fillRect(xStart, chartArea.top, xEnd - xStart, chartArea.bottom - chartArea.top);
        ctx.restore();
      });
    }
  };

  // Flip markers as scatter dataset
  const flipPoints = transitions.map(t => ({
    x: data[t.toIdx].date,
    y: data[t.toIdx].close,
    state: t.to
  }));

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'QQQ',
          data: closes,
          borderColor: '#e8e6e1',
          backgroundColor: 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0
        },
        {
          label: '200 SMA',
          data: sma200Arr,
          borderColor: '#d4a04a',
          backgroundColor: 'transparent',
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          tension: 0
        },
        {
          label: '50 SMA',
          data: sma50Arr,
          borderColor: '#6b6862',
          backgroundColor: 'transparent',
          borderWidth: 1,
          pointRadius: 0,
          tension: 0
        },
        {
          label: 'Flips',
          type: 'scatter',
          data: flipPoints,
          backgroundColor: flipPoints.map(p => p.state === 'LONG' ? '#5fb878' : (p.state === 'SHORT' ? '#d65a5a' : '#8a8680')),
          borderColor: '#0a0a0a',
          borderWidth: 1,
          pointRadius: 5,
          pointHoverRadius: 7,
          showLine: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          labels: { color: '#8a8680', font: { family: 'JetBrains Mono', size: 10 }, boxWidth: 18, boxHeight: 2 },
          position: 'top',
          align: 'end'
        },
        tooltip: {
          backgroundColor: '#111',
          borderColor: '#1f1f1f',
          borderWidth: 1,
          titleColor: '#e8e6e1',
          bodyColor: '#e8e6e1',
          titleFont: { family: 'JetBrains Mono', size: 11 },
          bodyFont: { family: 'JetBrains Mono', size: 11 },
          callbacks: {
            title: (items) => fmtDate(new Date(items[0].parsed.x)),
            label: (item) => item.dataset.label + ': $' + item.parsed.y.toFixed(2)
          }
        }
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'month', displayFormats: { month: 'MMM yy' } },
          grid: { color: '#1f1f1f', drawTicks: false },
          ticks: { color: '#6b6862', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 0 }
        },
        y: {
          grid: { color: '#1f1f1f', drawTicks: false },
          ticks: { color: '#6b6862', font: { family: 'JetBrains Mono', size: 10 }, callback: v => '$' + v }
        }
      }
    },
    plugins: [shadingPlugin]
  });
}

async function refresh(force = true) {
  document.getElementById('content').innerHTML = '<div class="loading"><span class="spinner"></span>Loading QQQ data…</div>';
  try {
    const data = await fetchQQQ(force);
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">Failed to load: ${e.message}<br><br>Check that the Cloudflare Worker is deployed and reachable.</div>`;
  }
}

(async () => {
  try {
    const data = await fetchQQQ(false);
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error">Failed to load: ${e.message}<br><br>Check that the Cloudflare Worker is deployed and reachable.</div>`;
  }
})();
